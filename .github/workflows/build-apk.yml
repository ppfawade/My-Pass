name: Build and Release Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Trigger release on tags like v1.0.0
  workflow_dispatch: # Allow manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate debug keystore
        run: |
          if [ ! -f "debug.keystore" ]; then
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          fi

      - name: Build APK with Gradle
        run: |
          # Use Gradle Wrapper if it exists in the exported repo, else fallback to global gradle
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-pass-app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Build ${{ github.run_number }}
          tag_name: build-${{ github.run_number }}
          generate_release_notes: true
